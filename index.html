<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Lander</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
    font-family: "Courier New", monospace;
  }
  #game {
    display: block;
    margin: 0 auto;
    background: #000;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', () => { resize(); genTerrain(); reset(); });
  resize();

  // --- Constants ---
  const GRAVITY = 0.018;
  const THRUST = 0.085;
  const ROT_SPEED = 0.055;
  const SAFE_VX = 1.3;
  const SAFE_VY = 1.8;
  const SAFE_ANGLE = 0.25; // radians from vertical
  const START_FUEL = 500;
  const SLUG_SPEED = 1.7;
  const SLUG_SPEED_STEP = 0.15;      // extra slug speed per bonus cannon
  const CANNON_LEVELS = [2, 5, 8, 11, 14, 16]; // one extra cannon unlocks at each
  const FIRE_INTERVAL = 150;  // frames between shots per cannon
  const SLUG_HIT_RADIUS = 15;
  const START_BOMBS = 3;
  const BOMB_EJECT = 2.2;    // ejection speed along the ship's down-axis
  const BOMB_RECOIL = 1.6;   // Newton: equal-and-opposite kick on the ship
  const BLAST_RADIUS = 55;

  // --- State ---
  let terrain = [];   // list of {x, y}
  let pads = [];      // list of {x1, x2, y, mult}
  let stars = [];
  let lander, particles, state, score = 0, level = 1;
  let cannons = [], slugs = [], bombs = [], booms = [];

  function genStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H * 0.85, r: Math.random() * 1.4 + 0.3 });
    }
  }

  function genTerrain() {
    terrain = [];
    pads = [];
    const segs = 30;
    const segW = W / segs;
    let y = H * (0.65 + Math.random() * 0.2);
    // choose pad segments (2 pads)
    const padSegs = new Set();
    while (padSegs.size < 2) {
      padSegs.add(3 + Math.floor(Math.random() * (segs - 6)));
    }
    let x = 0;
    terrain.push({ x, y });
    for (let i = 0; i < segs; i++) {
      if (padSegs.has(i)) {
        // flat pad, wider = easier
        const padW = segW * 2.1;
        const mult = pads.length === 0 ? 2 : 4; // second pad is narrower conceptually, higher score
        terrain.push({ x: x + padW, y });
        pads.push({ x1: x, x2: x + padW, y, mult });
        x += padW;
      } else {
        x += segW;
        y += (Math.random() - 0.5) * H * 0.18;
        y = Math.max(H * 0.45, Math.min(H * 0.92, y));
        terrain.push({ x, y });
      }
    }
    // make the last point reach the right edge
    terrain[terrain.length - 1].x = W;
  }

  function cannonCount() {
    return 2 + CANNON_LEVELS.filter(l => level >= l).length;
  }

  function slugSpeed() {
    return SLUG_SPEED + (cannonCount() - 2) * SLUG_SPEED_STEP;
  }

  function placeCannons() {
    cannons = [];
    // terrain vertices away from screen edges and landing pads
    const candidates = terrain.filter(pt =>
      pt.x > W * 0.08 && pt.x < W * 0.92 &&
      !pads.some(p => pt.x > p.x1 - 60 && pt.x < p.x2 + 60));
    const n = cannonCount();
    const minGap = Math.min(W * 0.15, (W * 0.8) / n); // tighter packing allowed as count grows
    for (let i = 0; i < n; i++) {
      const targetX = W * ((i + 1) / (n + 1));
      let best = null, bestDist = Infinity;
      for (const pt of candidates) {
        const d = Math.abs(pt.x - targetX);
        if (d < bestDist && !cannons.some(c => Math.abs(c.x - pt.x) < minGap)) {
          best = pt; bestDist = d;
        }
      }
      if (best) cannons.push({ x: best.x, y: best.y, angle: -Math.PI / 2, cooldown: 0 });
    }
  }

  function reset() {
    lander = {
      x: W * (0.2 + Math.random() * 0.6),
      y: H * 0.12,
      vx: (Math.random() - 0.5) * 1.2,
      vy: 0.3,
      angle: 0,
      fuel: START_FUEL,
      thrusting: false,
      thrustAmt: 0,
    };
    lander.bombs = START_BOMBS;
    particles = [];
    slugs = [];
    bombs = [];
    booms = [];
    placeCannons(); // destroyed cannons come back on retry
    // grace period before the cannons open fire, staggered per cannon
    cannons.forEach((c, i) => { c.cooldown = 120 + i * 75; });
    state = 'flying'; // flying | landed | crashed
  }

  // --- Input ---
  const keys = {};
  window.addEventListener('keydown', e => {
    if (e.key === 'Escape') { menuOpen = !menuOpen; return; }
    if (menuOpen) {
      if (e.key === 'ArrowUp') menuMove(-1);
      else if (e.key === 'ArrowDown') menuMove(1);
      else if (e.key === 'ArrowLeft') menuAdjust(-1);
      else if (e.key === 'ArrowRight') menuAdjust(1);
      else if (e.key === 'Enter' || e.key === ' ') menuActivate();
      e.preventDefault();
      return;
    }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','w','a','s','d','b'].includes(e.key)) e.preventDefault();
    keys[e.key] = true;
    if ((e.key === 'b' || e.key === 's' || e.key === 'ArrowDown') && !e.repeat) dropBomb();
    if (e.key === 'l' && !e.repeat) {
      settings.autoLevel = !settings.autoLevel;
      saveSettings();
    }
    if ((state === 'landed' || state === 'crashed') && (e.key === ' ' || e.key === 'Enter')) {
      if (state === 'landed') { level++; genTerrain(); }
      reset();
    }
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  // --- Controller settings (persisted) ---
  const DEFAULT_SETTINGS = { rotSens: 1.0, deadzone: 0.25, trigThresh: 0.10, autoLevel: true };
  let settings = { ...DEFAULT_SETTINGS };
  try {
    const saved = JSON.parse(localStorage.getItem('moonLanderSettings'));
    if (saved) settings = { ...DEFAULT_SETTINGS, ...saved };
  } catch (e) {}
  function saveSettings() {
    try { localStorage.setItem('moonLanderSettings', JSON.stringify(settings)); } catch (e) {}
  }

  let menuOpen = false, menuIndex = 0;
  const menuItems = [
    { label: 'ROTATION SENSITIVITY', key: 'rotSens',    min: 0.2,  max: 2.5, step: 0.1,  fmt: v => v.toFixed(1) + 'x' },
    { label: 'STICK DEADZONE',       key: 'deadzone',   min: 0.05, max: 0.6, step: 0.05, fmt: v => Math.round(v * 100) + '%' },
    { label: 'TRIGGER THRESHOLD',    key: 'trigThresh', min: 0.05, max: 0.6, step: 0.05, fmt: v => Math.round(v * 100) + '%' },
    { label: 'RESET TO DEFAULTS', action: 'reset' },
    { label: 'CLOSE', action: 'close' },
  ];

  function menuMove(d) {
    menuIndex = (menuIndex + d + menuItems.length) % menuItems.length;
  }
  function menuAdjust(d) {
    const it = menuItems[menuIndex];
    if (!it.key) return;
    const v = settings[it.key] + d * it.step;
    settings[it.key] = Math.round(Math.min(it.max, Math.max(it.min, v)) * 100) / 100;
    saveSettings();
  }
  function menuActivate() {
    const it = menuItems[menuIndex];
    if (it.action === 'reset') { settings = { ...DEFAULT_SETTINGS }; saveSettings(); }
    else if (it.action === 'close') menuOpen = false;
  }

  // --- Gamepad (Xbox 360 / standard mapping) ---
  let padConnected = false;
  let prevPadBtns = {};

  window.addEventListener('gamepadconnected', () => { padConnected = true; });
  window.addEventListener('gamepaddisconnected', () => { padConnected = false; });

  function pollGamepad() {
    const gp = (navigator.getGamepads ? navigator.getGamepads() : [])
      .find(g => g && g.connected);
    if (!gp) { padConnected = false; return null; }
    padConnected = true;

    const b = i => !!(gp.buttons[i] && gp.buttons[i].pressed);
    return {
      stickX: gp.axes[0] || 0,
      stickY: gp.axes[1] || 0,
      dpadUp: b(12), dpadDown: b(13), dpadLeft: b(14), dpadRight: b(15),
      a: b(0), bBtn: b(1), xBtn: b(2), lb: b(4), back: b(8), start: b(9),
      // A = full power; trigger is analog, rescaled so threshold..full-pull maps to 0..1
      thrustAmt: b(0) ? 1 : (() => {
        const v = gp.buttons[7] ? gp.buttons[7].value : 0;
        return v > settings.trigThresh ? (v - settings.trigThresh) / (1 - settings.trigThresh) : 0;
      })(),
    };
  }

  // --- Terrain helpers ---
  function terrainYAt(x) {
    for (let i = 0; i < terrain.length - 1; i++) {
      const a = terrain[i], b = terrain[i + 1];
      if (x >= a.x && x <= b.x) {
        const t = (x - a.x) / (b.x - a.x || 1);
        return a.y + t * (b.y - a.y);
      }
    }
    return H;
  }

  function padAt(x) {
    return pads.find(p => x >= p.x1 && x <= p.x2) || null;
  }

  // --- Update ---
  function update() {
    const pad = pollGamepad();

    // edge-detect gamepad buttons (pressed this frame, not held)
    const edge = {};
    if (pad) {
      const cur = {
        navUp: pad.dpadUp || pad.stickY < -0.5,
        navDown: pad.dpadDown || pad.stickY > 0.5,
        navLeft: pad.dpadLeft || pad.stickX < -0.5,
        navRight: pad.dpadRight || pad.stickX > 0.5,
        a: pad.a, bBtn: pad.bBtn, xBtn: pad.xBtn, lb: pad.lb,
        back: pad.back, start: pad.start,
      };
      for (const k in cur) edge[k] = cur[k] && !prevPadBtns[k];
      prevPadBtns = cur;
    } else {
      prevPadBtns = {};
    }

    if (pad && edge.back) menuOpen = !menuOpen;

    if (menuOpen) { // game paused while menu is open
      if (pad) {
        if (edge.navUp) menuMove(-1);
        if (edge.navDown) menuMove(1);
        if (edge.navLeft) menuAdjust(-1);
        if (edge.navRight) menuAdjust(1);
        if (edge.a) menuActivate();
        if (edge.bBtn) menuOpen = false;
      }
      return;
    }

    if (pad && (edge.a || edge.start) && (state === 'landed' || state === 'crashed')) {
      if (state === 'landed') { level++; genTerrain(); }
      reset();
      return;
    }

    if (pad && edge.xBtn) {
      settings.autoLevel = !settings.autoLevel;
      saveSettings();
    }

    if (state !== 'flying') return;

    if (pad && (edge.bBtn || edge.lb)) dropBomb();

    let rot = 0;
    if (keys['ArrowLeft'] || keys['a']) rot -= 1;
    if (keys['ArrowRight'] || keys['d']) rot += 1;
    if (pad) {
      if (Math.abs(pad.stickX) > settings.deadzone) rot += pad.stickX * settings.rotSens; // analog
      else if (pad.dpadLeft) rot -= settings.rotSens;
      else if (pad.dpadRight) rot += settings.rotSens;
    }
    if (rot) {
      lander.angle += ROT_SPEED * rot;
    } else if (settings.autoLevel) {
      // gentle feedback loop: ease back upright when controls are neutral
      let dev = lander.angle % (Math.PI * 2);
      if (dev > Math.PI) dev -= Math.PI * 2;
      if (dev < -Math.PI) dev += Math.PI * 2;
      lander.angle = dev * 0.99;
    }

    lander.thrusting = false;
    let thrustAmt = 0;
    if (keys['ArrowUp'] || keys['w'] || keys[' ']) thrustAmt = 1;
    if (pad) thrustAmt = Math.max(thrustAmt, pad.thrustAmt);
    lander.thrustAmt = 0;
    if (thrustAmt > 0 && lander.fuel > 0) {
      lander.thrusting = true;
      lander.thrustAmt = thrustAmt;
      lander.vx += Math.sin(lander.angle) * THRUST * thrustAmt;
      lander.vy -= Math.cos(lander.angle) * THRUST * thrustAmt;
      lander.fuel -= thrustAmt; // fuel burn scales with throttle
      // exhaust particles
      const n = Math.max(1, Math.round(3 * thrustAmt));
      for (let i = 0; i < n; i++) {
        const spread = (Math.random() - 0.5) * 0.5;
        particles.push({
          x: lander.x - Math.sin(lander.angle) * 14,
          y: lander.y + Math.cos(lander.angle) * 14,
          vx: lander.vx - Math.sin(lander.angle + spread) * (1 + 2 * thrustAmt),
          vy: lander.vy + Math.cos(lander.angle + spread) * (1 + 2 * thrustAmt),
          life: 20 + Math.random() * 15,
          color: Math.random() < 0.5 ? '#ffa726' : '#fff176',
        });
      }
    }

    lander.vy += GRAVITY;
    lander.x += lander.vx;
    lander.y += lander.vy;

    // wrap horizontally
    if (lander.x < 0) lander.x += W;
    if (lander.x > W) lander.x -= W;

    // collision — check the two landing feet
    const footOffsets = [-10, 10];
    let touchdown = false;
    for (const off of footOffsets) {
      const fx = lander.x + Math.cos(lander.angle) * off - Math.sin(lander.angle) * 12;
      const fy = lander.y + Math.sin(lander.angle) * off + Math.cos(lander.angle) * 12;
      if (fy >= terrainYAt(fx)) touchdown = true;
    }

    if (touchdown) {
      const pad = padAt(lander.x);
      const upright = Math.abs(((lander.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2)) < SAFE_ANGLE
                   || Math.abs(((lander.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2)) > Math.PI * 2 - SAFE_ANGLE;
      const slow = Math.abs(lander.vx) < SAFE_VX && lander.vy < SAFE_VY;
      if (pad && upright && slow) {
        state = 'landed';
        lander.y = pad.y - 12;
        lander.vx = lander.vy = 0;
        lander.angle = 0;
        score += 50 * pad.mult + Math.floor(lander.fuel / 10);
      } else {
        state = 'crashed';
        explode();
      }
    }
  }

  function explode() {
    for (let i = 0; i < 60; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = Math.random() * 4 + 1;
      particles.push({
        x: lander.x, y: lander.y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
        life: 40 + Math.random() * 40,
        color: ['#ff5252', '#ffa726', '#fff176', '#eee'][Math.floor(Math.random() * 4)],
      });
    }
  }

  function dropBomb() {
    if (state !== 'flying' || lander.bombs <= 0) return;
    lander.bombs--;
    // ship's down-axis (opposite the thrust vector)
    const dx = -Math.sin(lander.angle), dy = Math.cos(lander.angle);
    bombs.push({
      x: lander.x + dx * 16,
      y: lander.y + dy * 16,
      vx: lander.vx + dx * BOMB_EJECT,
      vy: lander.vy + dy * BOMB_EJECT,
    });
    // Newton: equal and opposite — the ship gets a nudge upward
    lander.vx -= dx * BOMB_RECOIL;
    lander.vy -= dy * BOMB_RECOIL;
  }

  function detonate(x, y) {
    booms.push({ x, y, r: 6, max: BLAST_RADIUS });
    for (let i = 0; i < 50; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = Math.random() * 3.5 + 1;
      particles.push({
        x, y: y - 2,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 2,
        life: 30 + Math.random() * 35,
        color: ['#ffa726', '#fff176', '#ff7043', '#eee'][Math.floor(Math.random() * 4)],
      });
    }
    for (let i = cannons.length - 1; i >= 0; i--) {
      if (Math.hypot(cannons[i].x - x, cannons[i].y - y) < BLAST_RADIUS) {
        cannons.splice(i, 1);
        score += 75;
      }
    }
    for (let i = slugs.length - 1; i >= 0; i--) {
      if (Math.hypot(slugs[i].x - x, slugs[i].y - y) < BLAST_RADIUS) slugs.splice(i, 1);
    }
    // your own blast can take you down too
    if (state === 'flying' && Math.hypot(lander.x - x, lander.y - y) < BLAST_RADIUS * 0.8) {
      state = 'crashed';
      explode();
    }
  }

  function updateBombs() {
    for (let i = bombs.length - 1; i >= 0; i--) {
      const b = bombs[i];
      b.vy += GRAVITY;
      b.x += b.vx;
      b.y += b.vy;
      if (b.x < -20 || b.x > W + 20) { bombs.splice(i, 1); continue; }
      const direct = cannons.some(c => Math.hypot(b.x - c.x, b.y - c.y) < 16);
      if (direct || b.y >= terrainYAt(b.x)) {
        detonate(b.x, Math.min(b.y, terrainYAt(b.x)));
        bombs.splice(i, 1);
      }
    }
    for (let i = booms.length - 1; i >= 0; i--) {
      booms[i].r += 3;
      if (booms[i].r > booms[i].max) booms.splice(i, 1);
    }
  }

  function updateCannons() {
    for (const c of cannons) {
      if (state === 'flying') {
        // smoothly track the lander
        let target = Math.atan2(lander.y - c.y, lander.x - c.x);
        let diff = target - c.angle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        c.angle += diff * 0.06;

        c.cooldown--;
        if (c.cooldown <= 0) {
          c.cooldown = FIRE_INTERVAL + Math.random() * 60;
          const sp = slugSpeed();
          slugs.push({
            x: c.x + Math.cos(c.angle) * 24,
            y: c.y + Math.sin(c.angle) * 24 - 6,
            vx: Math.cos(c.angle) * sp,
            vy: Math.sin(c.angle) * sp,
            life: 900,
          });
        }
      }
    }

    for (let i = slugs.length - 1; i >= 0; i--) {
      const s = slugs[i];
      s.x += s.vx;
      s.y += s.vy;
      s.life--;
      if (s.life <= 0 || s.x < -20 || s.x > W + 20 || s.y < -20 || s.y > H + 20
          || s.y > terrainYAt(s.x)) {
        slugs.splice(i, 1);
        continue;
      }
      if (state === 'flying' && Math.hypot(s.x - lander.x, s.y - lander.y) < SLUG_HIT_RADIUS) {
        slugs.splice(i, 1);
        state = 'crashed';
        explode();
      }
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += GRAVITY * 0.5;
      p.life--;
      if (p.life <= 0 || p.y > terrainYAt(p.x)) particles.splice(i, 1);
    }
  }

  // --- Draw ---
  function drawStars() {
    ctx.fillStyle = '#fff';
    for (const s of stars) {
      ctx.globalAlpha = 0.4 + Math.random() * 0.3;
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
    ctx.globalAlpha = 1;
  }

  function drawTerrain() {
    ctx.beginPath();
    ctx.moveTo(terrain[0].x, terrain[0].y);
    for (const pt of terrain) ctx.lineTo(pt.x, pt.y);
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fillStyle = '#1a1a1a';
    ctx.fill();
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(terrain[0].x, terrain[0].y);
    for (const pt of terrain) ctx.lineTo(pt.x, pt.y);
    ctx.stroke();

    // pads
    for (const p of pads) {
      ctx.strokeStyle = '#4caf50';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(p.x1, p.y);
      ctx.lineTo(p.x2, p.y);
      ctx.stroke();
      ctx.fillStyle = '#4caf50';
      ctx.font = '12px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('x' + p.mult, (p.x1 + p.x2) / 2, p.y + 16);
    }
  }

  function drawCannons() {
    for (const c of cannons) {
      ctx.save();
      ctx.translate(c.x, c.y);
      // barrel
      ctx.save();
      ctx.rotate(c.angle);
      ctx.fillStyle = '#37474f';
      ctx.strokeStyle = '#4dd0e1';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.rect(6, -3.5, 20, 7);
      ctx.fill();
      ctx.stroke();
      // muzzle glow
      ctx.beginPath();
      ctx.arc(26, 0, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#ff4081';
      ctx.fill();
      ctx.restore();
      // dome base
      ctx.beginPath();
      ctx.arc(0, 0, 11, Math.PI, 0);
      ctx.closePath();
      ctx.fillStyle = '#263238';
      ctx.fill();
      ctx.strokeStyle = '#4dd0e1';
      ctx.stroke();
      // blinking core light
      ctx.beginPath();
      ctx.arc(0, -4, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = (Math.floor(performance.now() / 400) % 2) ? '#ff4081' : '#880e4f';
      ctx.fill();
      ctx.restore();
    }
  }

  function drawSlugs() {
    for (const s of slugs) {
      // trail
      ctx.strokeStyle = 'rgba(255, 64, 129, 0.35)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(s.x - s.vx * 6, s.y - s.vy * 6);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      // glowing slug
      ctx.save();
      ctx.shadowColor = '#ff4081';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = '#ff80ab';
      ctx.fill();
      ctx.restore();
    }
  }

  function drawBombs() {
    for (const b of bombs) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(Math.atan2(b.vy, b.vx));
      // body
      ctx.fillStyle = '#455a64';
      ctx.strokeStyle = '#90a4ae';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(0, 0, 6, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      // tail fins
      ctx.beginPath();
      ctx.moveTo(-5, 0); ctx.lineTo(-9, -4);
      ctx.moveTo(-5, 0); ctx.lineTo(-9, 4);
      ctx.stroke();
      // armed light
      if (Math.floor(performance.now() / 150) % 2) {
        ctx.beginPath();
        ctx.arc(2, 0, 1.6, 0, Math.PI * 2);
        ctx.fillStyle = '#ff5252';
        ctx.fill();
      }
      ctx.restore();
    }
    // expanding blast rings
    for (const bm of booms) {
      ctx.globalAlpha = Math.max(0, 1 - bm.r / bm.max);
      ctx.strokeStyle = '#ffa726';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(bm.x, bm.y, bm.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function drawLander() {
    if (state === 'crashed') return;
    ctx.save();
    ctx.translate(lander.x, lander.y);
    ctx.rotate(lander.angle);

    // flame — length and width scale with throttle
    if (lander.thrusting && state === 'flying') {
      const amt = lander.thrustAmt;
      const flick = Math.random() * 8 * amt;
      const w = 2 + 3 * amt;
      ctx.beginPath();
      ctx.moveTo(-w, 12);
      ctx.lineTo(0, 12 + (10 + flick) * amt);
      ctx.lineTo(w, 12);
      ctx.closePath();
      ctx.fillStyle = amt < 0.5 ? '#ffcc80' : '#ffa726';
      ctx.fill();
    }

    // body
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 2;
    ctx.fillStyle = '#333';
    // capsule
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(9, -2);
    ctx.lineTo(9, 6);
    ctx.lineTo(-9, 6);
    ctx.lineTo(-9, -2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // legs
    ctx.beginPath();
    ctx.moveTo(-7, 6); ctx.lineTo(-11, 13);
    ctx.moveTo(7, 6);  ctx.lineTo(11, 13);
    ctx.stroke();
    // feet
    ctx.beginPath();
    ctx.moveTo(-14, 13); ctx.lineTo(-8, 13);
    ctx.moveTo(8, 13);   ctx.lineTo(14, 13);
    ctx.stroke();
    // window
    ctx.beginPath();
    ctx.arc(0, -4, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = '#4fc3f7';
    ctx.fill();

    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = Math.min(1, p.life / 30);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    ctx.fillStyle = '#e0e0e0';
    ctx.font = '14px Courier New';
    ctx.textAlign = 'left';
    const vxOk = Math.abs(lander.vx) < SAFE_VX;
    const vyOk = lander.vy < SAFE_VY;
    ctx.fillText('SCORE  ' + score, 20, 28);
    ctx.fillText('LEVEL  ' + level, 20, 48);
    ctx.fillText('FUEL   ' + Math.max(0, Math.floor(lander.fuel)), 20, 68);
    ctx.fillStyle = vxOk ? '#4caf50' : '#ff5252';
    ctx.fillText('VX     ' + lander.vx.toFixed(2), 20, 88);
    ctx.fillStyle = vyOk ? '#4caf50' : '#ff5252';
    ctx.fillText('VY     ' + lander.vy.toFixed(2), 20, 108);
    ctx.fillStyle = lander.bombs > 0 ? '#e0e0e0' : '#666';
    ctx.fillText('BOMBS  ' + '●'.repeat(lander.bombs) + '○'.repeat(START_BOMBS - lander.bombs), 20, 128);

    // fuel bar
    ctx.strokeStyle = '#888';
    ctx.strokeRect(120, 58, 100, 10);
    ctx.fillStyle = lander.fuel > 100 ? '#4caf50' : '#ff5252';
    ctx.fillRect(120, 58, Math.max(0, lander.fuel / START_FUEL) * 100, 10);

    // controller indicator
    ctx.font = '13px Courier New';
    ctx.textAlign = 'right';
    if (padConnected) {
      ctx.fillStyle = '#4caf50';
      ctx.fillText('\u{1F3AE} CONTROLLER', W - 20, 28);
    }
    ctx.fillStyle = settings.autoLevel ? '#4caf50' : '#666';
    ctx.fillText('LEVEL ASSIST ' + (settings.autoLevel ? 'ON' : 'OFF'), W - 20, 48);

    ctx.textAlign = 'center';
    const restartHint = padConnected ? 'Press SPACE or A' : 'Press SPACE';
    if (state === 'landed') {
      ctx.fillStyle = '#4caf50';
      ctx.font = 'bold 32px Courier New';
      ctx.fillText('THE EAGLE HAS LANDED', W / 2, H / 2 - 20);
      ctx.font = '16px Courier New';
      ctx.fillStyle = '#e0e0e0';
      ctx.fillText(restartHint + ' for next level', W / 2, H / 2 + 12);
    } else if (state === 'crashed') {
      ctx.fillStyle = '#ff5252';
      ctx.font = 'bold 32px Courier New';
      ctx.fillText('CRASHED', W / 2, H / 2 - 20);
      ctx.font = '16px Courier New';
      ctx.fillStyle = '#e0e0e0';
      ctx.fillText(restartHint + ' to retry', W / 2, H / 2 + 12);
    } else {
      ctx.fillStyle = '#666';
      ctx.font = '13px Courier New';
      const hint = padConnected
        ? 'Stick/D-pad rotate   A / RT thrust   B / LB bomb   X assist   BACK settings'
        : '← → rotate   ↑ / SPACE thrust   B / ↓ bomb   L assist   ESC settings';
      ctx.fillText(hint, W / 2, H - 16);
    }
  }

  function drawMenu() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
    ctx.fillRect(0, 0, W, H);
    const cx = W / 2;
    const top = H / 2 - 140;

    ctx.textAlign = 'center';
    ctx.fillStyle = '#4caf50';
    ctx.font = 'bold 26px Courier New';
    ctx.fillText('CONTROLLER SETTINGS', cx, top);

    menuItems.forEach((it, i) => {
      const y = top + 56 + i * 48;
      const sel = i === menuIndex;
      ctx.fillStyle = sel ? '#fff176' : '#e0e0e0';
      ctx.font = (sel ? 'bold ' : '') + '15px Courier New';
      let text = it.label;
      if (it.key) text += '   < ' + it.fmt(settings[it.key]) + ' >';
      ctx.fillText((sel ? '> ' : '') + text + (sel ? ' <' : ''), cx, y);

      if (it.key) {
        const frac = (settings[it.key] - it.min) / (it.max - it.min);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        ctx.strokeRect(cx - 100, y + 8, 200, 7);
        ctx.fillStyle = sel ? '#fff176' : '#888';
        ctx.fillRect(cx - 100, y + 8, 200 * frac, 7);
      }
    });

    ctx.fillStyle = '#666';
    ctx.font = '13px Courier New';
    ctx.fillText('↑↓ select   ←→ adjust   ENTER / A confirm   ESC / B / BACK close', cx, top + 56 + menuItems.length * 48 + 10);
  }

  // --- Main loop ---
  function loop() {
    update();
    if (!menuOpen) {
      updateCannons();
      updateBombs();
      updateParticles();
    }
    ctx.clearRect(0, 0, W, H);
    drawStars();
    drawTerrain();
    drawCannons();
    drawSlugs();
    drawBombs();
    drawParticles();
    drawLander();
    drawHUD();
    if (menuOpen) drawMenu();
    requestAnimationFrame(loop);
  }

  genStars();
  genTerrain();
  reset();
  loop();
})();
</script>
</body>
</html>
