name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node tests/smoke.mjs
      - run: node tests/restore-check.mjs
      - run: node tests/cheat-check.mjs
      # type-checking only — the .js files ship as-is, no build step
      - run: npx -y -p typescript@5 tsc --noEmit
